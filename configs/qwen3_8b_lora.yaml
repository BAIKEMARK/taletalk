### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

### dataset
dataset: qixia_train
eval_dataset: qixia_valid
dataset_dir: data
template: qwen3
cutoff_len: 1024
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: /network-workspace/qixia-rocm-lora/outputs/qwen3_8b_lora
logging_dir: /network-workspace/qixia-rocm-lora/logs
logging_steps: 5
save_steps: 100
plot_loss: true
overwrite_output_dir: true
disable_tqdm: false
report_to: none

### train
per_device_train_batch_size: 4
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
fp16: false
gradient_checkpointing: false
ddp_timeout: 180000000

### eval
val_size: 0.0
eval_strategy: steps
eval_steps: 100
