seed = 42

enable_memory = true
generation_mode = "one_pass"
ai_passes = 1
ai_audit_mode = "rules"
scene_max_chars = 1800
scene_overlap_chars = 250
teacher_backend = "stepfun"
teacher_model = "step-3.7-flash"
teacher_batch_size = 5
teacher_concurrency = 6
generation_checkpoint_dir = "cache/raft_generation"
memory_backend = "bm25"
retrieval_mode = "hybrid"
embedding_backend = "auto"  # auto: 填 URL/key 走云端；未填用本地 fallback；cloud: 强制云端
embedding_provider = "parallel_cloud"  # 并行智算云；通用 OpenAI 兼容服务可改 openai_compatible
embedding_base_url = ""
embedding_api_key = ""
embedding_model = "GLM-Embedding-3"
embedding_batch_size = 64
embedding_dimensions = 64
reranker_backend = "auto"
reranker_provider = "parallel_cloud"  # 并行智算云 rerank: {base_url}/p002/rerank
reranker_base_url = ""
reranker_api_key = ""
reranker_model = "GLM-Rerank"
use_reranker = true
bm25_top_k = 20
embedding_top_k = 20
rerank_top_k = 5
top_k_memory = 3
