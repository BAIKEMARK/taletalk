# TaleTalk config: 《十日终焉》 / 齐夏
# 小说全文不提交到 GitHub。请把 txt 放到:
#   novels/《十日终焉》（校对全本）.txt

novel_txt = "novels/《十日终焉》（校对全本）.txt"
target_role = "齐夏,老齐,齐哥,小齐"
novel_title = "十日终焉"
run_name = "shiri_qixia"

model_choice = "qwen3_5_9b"
