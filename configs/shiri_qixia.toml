extraction_backend = "local_model"

llm_platform = "custom"
custom_base_url = "https://api.stepfun.com/step_plan/v1"
custom_api_key = ""
custom_model_name = "step-3.7-flash"

local_model_id_override = ""
local_model_port = 8000
vllm_gpu_util = 0.85
max_workers = 6
chunk_size_tokens = 1500

valid_ratio = 0.05
