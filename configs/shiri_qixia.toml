target_train_samples = 3000
eval_question_count = 120
eval_report_dir = "reports"
role_package_dir = "dist/roles"
export_mode = "private_full"

per_device_train_batch_size = 4
gradient_accumulation_steps = 4
learning_rate = 1e-4
num_train_epochs = 1.0
lora_rank = 8
lora_alpha = 16
lora_dropout = 0.05
cutoff_len = 1024
warmup_ratio = 0.05
lr_scheduler_type = "cosine"
logging_steps = 5
save_steps = 100
eval_steps = 100
gradient_checkpointing = false
model_cache_dir = "/network-workspace/models"
output_dir = "/network-workspace/outputs"

gradio_port = 7860
share = false
stream_output = true
