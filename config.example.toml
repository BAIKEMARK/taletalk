# ==============================================
# TaleTalk 配置文件模板
# 复制为 config.toml 后修改参数即可使用
# ==============================================

# ====== 基础输入 ======
novel_txt = "novels/西游记白话文.txt"  # 小说原文路径
target_role = "孙悟空,悟空,行者,孙行者,大圣,齐天大圣,猴王,美猴王,老孙"  # 要复刻的角色，逗号分隔别名，第一个为规范名
novel_title = "西游记"  # 小说名，用于生成system prompt
run_name = "xyj_wukong"  # 运行标识，所有输出文件都会带这个前缀

# ====== 模型配置（抽取+训练+推理共用） ======
model_choice = "qwen3_5_9b"  # 模型选择，对应下面MODEL_IDS中的key
model_ids = { "qwen3_5_9b" = "Qwen/Qwen3.5-9B", "qwen3_5_27b" = "Qwen/Qwen3.5-27B", "qwen3_6_35b_a3b" = "Qwen/Qwen3.6-35B-A3B", "qwen3_8b" = "Qwen/Qwen3-8B" }

# ====== 抽取后端选择 ======
extraction_backend = "local_model"  # 可选: local_model / cloud_api

# --- cloud_api 配置 ---
llm_platform = "custom"  # 可选: deepseek / openai / siliconflow / moonshot / custom
custom_base_url = "https://api.stepfun.com/v1"  # custom后端的API地址
custom_api_key = "sk-xxx"  # custom后端的API密钥
custom_model_name = "step-3.5-flash"  # custom后端的模型名

# --- local_model 配置 ---
local_model_id_override = ""  # 留空则复用上面的model_id，填了则用指定模型抽取
local_model_port = 8000  # vLLM服务端口
vllm_gpu_util = 0.85  # GPU显存使用率限制
max_workers = 6  # 抽取并发线程数
chunk_size_tokens = 1500  # 每个抽取块的token数

# ====== SFT数据集生成配置 ======
valid_ratio = 0.05  # 验证集比例
max_conversations = 0  # 最多生成多少条对话，0表示不限制
seed = 42  # 随机种子

# ====== LoRA训练配置 ======
per_device_train_batch_size = 4
gradient_accumulation_steps = 4
learning_rate = 1e-4
num_train_epochs = 1.0
lora_rank = 8
lora_alpha = 16
lora_dropout = 0.05
cutoff_len = 1024
warmup_ratio = 0.05
lr_scheduler_type = "cosine"
logging_steps = 5
save_steps = 100
eval_steps = 100
gradient_checkpointing = false  # 显存够就关，提速25%~35%
model_cache_dir = "/network-workspace/models"  # 模型缓存目录
output_dir = "/network-workspace/outputs"  # LoRA输出目录

# ====== 推理服务配置 ======
gradio_port = 7860  # Gradio服务端口
share = false  # 是否生成公网共享链接
stream_output = true  # 是否开启流式输出
